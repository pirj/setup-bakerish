name: 'Setup snapcompose'
description: >-
  Install aq + rlock + snapcompose, wire up RLOCK_PLUGIN_PATH, and restore
  the snapshot layer cache. After this step `bake run -- <cmd>` works in
  the runner with sub-second warm restores on subsequent runs.
author: 'pirj'
branding:
  icon: 'package'
  color: 'orange'

inputs:
  aq-version:
    description: 'Release tag of pirj/aq to install (e.g. v2.5.23). Download is via release tarball — must match an existing GH Release.'
    required: false
    default: 'v2.5.38'
  rlock-version:
    description: 'Release tag of pirj/rlock to install (e.g. v0.1.3).'
    required: false
    default: 'v0.1.11'
  snapcompose-version:
    description: 'Release tag of pirj/snapcompose to install (e.g. v0.1.2).'
    required: false
    default: 'v0.2.1'
  cache-key-prefix:
    description: >-
      Prefix for the actions/cache key. Use to segment caches by purpose
      (e.g. `snapcompose-fast` vs `snapcompose-full`) or to invalidate on
      ecosystem-level config bumps without changing any input file.
    required: false
    default: 'snapcompose'
  cache-extra-paths:
    description: >-
      Newline-separated extra file globs to hash into the cache key on
      top of the built-in defaults (snapcompose.toml + common lockfiles +
      db/schema.rb + db/migrate/** + Dockerfile + docker-compose.*).
      Use when your project has its own cache-invalidating files
      (custom build configs, generated headers, etc.).
    required: false
    default: ''
  cache-restore-only:
    description: >-
      `true` to restore-only (skip the post-job save step). Useful in
      jobs that don't materially populate new cache layers and where
      saving would be a write-amp regression. Default is to restore
      AND save.
    required: false
    default: 'false'
  no-snapshot-compress:
    description: >-
      `true` to set AQ_NO_SNAPSHOT_COMPRESS=1 in the environment. Trades
      ~1.1 GB extra cache per kind=live layer for ~400 ms faster warm
      restore per `bake run`. Worth it for high-volume CI where warm time
      multiplies across many invocations; default-off matches aq's
      default and is the right choice for cache-quota-constrained repos.
    required: false
    default: 'false'
  oci-cache-ref:
    description: >-
      Optional OCI ref (e.g. ghcr.io/<owner>/snapcompose-cache:latest)
      used as a second-tier cache. When set, this step also installs
      `oras` and — on GH-cache miss — attempts `bake cache --pull
      <oci-cache-ref>` as a fallback. The push side stays in the
      user's workflow (see README for the main-only post-step that
      calls `bake cache --push`).
    required: false
    default: ''
  disable-zstd-asm:
    description: >-
      Debug-only. Set to `'true'` to build the bundled zstd with
      ZSTD_NO_ASM=1 (disables the hand-written x86_64 BMI2 Huffman
      asm in lib/decompress/huf_decompress_amd64.S; the decoder
      falls back to the C scalar path). Useful to isolate whether
      an x86_64-native --patch-from corruption (issue tracked in
      meta/TODO.md) lives in that asm file.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install host prereqs (qemu + zstd[+ oras if OCI fallback set])
      shell: bash
      env:
        OCI_REF: ${{ inputs.oci-cache-ref }}
        DISABLE_ZSTD_ASM: ${{ inputs.disable-zstd-asm }}
      run: |
        set -e
        case "$RUNNER_OS" in
          Linux)
            sudo apt-get update -qq
            # `ovmf` is needed by aq's base-build path: the Alpine live
            # ISO boots via UEFI for the initial setup-alpine install,
            # even though direct kernel boot is the default for every
            # VM started from the resulting base. `tio` is aq's serial
            # console helper. `socat` + `wget` round out aq's
            # host_deps.
            # qemu-utils ships qemu-img (separate package from
            # qemu-system-x86 on Ubuntu, needed for aq's base-image
            # work and snapshot rebases).
            #
            # Note: Ubuntu 24.04 LTS ships tio 2.5 but aq needs tio
            # >= 3.8 for the Lua scripting API (in v3.8 the
            # "write to serial" function was renamed from send() to
            # write(); aq's scripts use the v3.8+ name). We install
            # everything except tio from apt, then build a current
            # tio from source below. See TODO.md for the plan to
            # drop this source-build when ubuntu-26.04 is available
            # on GH Actions.
            sudo apt-get install -y --no-install-recommends \
              qemu-system-x86 qemu-utils ovmf socat wget \
              meson ninja-build pkg-config liblua5.4-dev libinih-dev libglib2.0-dev gcc
            TIO_VERSION=3.9
            curl -sSL "https://github.com/tio/tio/archive/refs/tags/v${TIO_VERSION}.tar.gz" \
              | tar xz -C "$HOME"
            (
              cd "$HOME/tio-${TIO_VERSION}"
              meson setup build --prefix=/usr/local
              meson compile -C build
              sudo meson install -C build
            )
            # zstd 1.5.5 (Ubuntu 24.04 apt default) has a --patch-from
            # bug for ~1.7 GiB refs under --long=31 (produces patches
            # whose decode trips error 36 "Restored data doesn't match
            # checksum"). Fixed in 1.5.6. Build 1.5.7 from source.
            # Drop this when ubuntu-26 ships in GH runner images and
            # apt's zstd is ≥ 1.5.6.
            ZSTD_VER=1.5.7
            ZSTD_BUILD_ARGS="HAVE_PTHREAD=1"
            ZSTD_BUILD_CFLAGS=""
            # debug-only knob: aggressively disable hand-written asm AND
            # x86-64 SIMD/BMI2 intrinsics. Used to isolate where the
            # Azure-KVM --patch-from corruption (meta/TODO.md known
            # issues) actually lives:
            #   ZSTD_NO_ASM=1            — drop lib/decompress/huf_decompress_amd64.S
            #   -DZSTD_NO_INTRINSICS     — drop all _mm_*/__m128/BMI2 C intrinsics
            # If the bug still reproduces with both off, it's in plain
            # C that the compiler vectorized into x86_64 SIMD ops we
            # didn't gate.
            if [ "${DISABLE_ZSTD_ASM:-false}" = "true" ]; then
              ZSTD_BUILD_ARGS="$ZSTD_BUILD_ARGS ZSTD_NO_ASM=1"
              ZSTD_BUILD_CFLAGS="-DZSTD_NO_INTRINSICS -O0 -fno-tree-vectorize"
              echo "[debug] building zstd with ZSTD_NO_ASM=1, -DZSTD_NO_INTRINSICS, -O0, -fno-tree-vectorize"
            fi
            curl -sSL "https://github.com/facebook/zstd/archive/refs/tags/v${ZSTD_VER}.tar.gz" \
              | tar xz -C "$HOME"
            ZSTD_CFLAGS_BASE="-O3"
            [ -n "$ZSTD_BUILD_CFLAGS" ] && ZSTD_CFLAGS_BASE="$ZSTD_BUILD_CFLAGS"
            (cd "$HOME/zstd-${ZSTD_VER}" && CFLAGS="$ZSTD_CFLAGS_BASE" make -j zstd $ZSTD_BUILD_ARGS >/dev/null 2>&1)
            sudo install -m 0755 "$HOME/zstd-${ZSTD_VER}/programs/zstd" /usr/local/bin/zstd
            (cd "$HOME/zstd-${ZSTD_VER}/contrib/pzstd" && CFLAGS="$ZSTD_CFLAGS_BASE" make -j pzstd $ZSTD_BUILD_ARGS >/dev/null 2>&1) || true
            if [ -f "$HOME/zstd-${ZSTD_VER}/contrib/pzstd/pzstd" ]; then
              sudo install -m 0755 "$HOME/zstd-${ZSTD_VER}/contrib/pzstd/pzstd" /usr/local/bin/pzstd
            fi
            if [ -n "$OCI_REF" ]; then
              sudo apt-get install -y --no-install-recommends oras
            fi
            # GH ubuntu-* runners ship with /dev/kvm but the `runner`
            # user isn't in the `kvm` group — every QEMU invocation
            # would die with "/dev/kvm exists but is not accessible".
            # The canonical fix is the udev rule below, recommended by
            # the GH-actions-runner-images repo for KVM users.
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
            ;;
          macOS)
            # GH macos-* runners have HVF but no qemu pre-installed,
            # and ship Apple's ancient `/bin/bash` 3.2 (pre-GPLv3 cut)
            # which lacks `mapfile`, used throughout snapcompose + rlock.
            # `brew install bash` puts Bash 5.x at /opt/homebrew/bin/
            # bash, which #!/usr/bin/env bash shebangs then pick up.
            # Brew install is slow (~1 min) but cached on subsequent runs.
            local_pkgs="bash qemu zstd tio socat"
            [ -n "$OCI_REF" ] && local_pkgs="$local_pkgs oras"
            brew install $local_pkgs
            ;;
          *)
            echo "Error: unsupported RUNNER_OS=$RUNNER_OS" >&2
            exit 1
            ;;
        esac

    - name: Ensure an SSH key exists for aq's base-image bootstrap
      shell: bash
      run: |
        # aq's base-build path reads $HOME/.ssh/*.pub and bakes it into
        # the Alpine ISO's setup.conf as the guest user's
        # authorized_keys. GH runners ship without ~/.ssh, so generate
        # an ephemeral ed25519 key if none exists. The key is per-job
        # (runner is destroyed at job end); not a long-lived secret.
        if [ ! -d "$HOME/.ssh" ] || ! ls "$HOME/.ssh"/*.pub >/dev/null 2>&1; then
            mkdir -p "$HOME/.ssh"
            ssh-keygen -t ed25519 -N '' -f "$HOME/.ssh/id_ed25519" -q
        fi

    - name: Install aq / rlock / snapcompose from release tarballs
      shell: bash
      env:
        AQ_VERSION:     ${{ inputs.aq-version }}
        RLOCK_VERSION:  ${{ inputs.rlock-version }}
        SNAPCOMPOSE_VERSION: ${{ inputs.snapcompose-version }}
      run: |
        set -e
        # Release tarballs are the GitHub-auto-generated source archives
        # at `archive/refs/tags/<tag>.tar.gz`. Faster than `git clone`
        # (one anonymous GET vs git protocol negotiation) and the
        # *-version inputs naturally enforce "pinned to a real release"
        # rather than tracking a moving branch.
        fetch() {
            local owner_repo="$1" tag="$2" dest="$3"
            local url="https://github.com/${owner_repo}/archive/refs/tags/${tag}.tar.gz"
            mkdir -p "$dest"
            # --strip-components=1 drops the `<repo>-<tag-no-v>/` prefix
            # the GH-generated tarball wraps everything in.
            curl -sSL "$url" | tar xz -C "$dest" --strip-components=1
            # `aq` ships an executable shell script (no extension) at
            # the repo root — make sure it's executable.
            find "$dest/bin" -type f -exec chmod +x {} + 2>/dev/null || true
        }
        fetch pirj/aq        "$AQ_VERSION"     "$HOME/aq"
        fetch pirj/rlock     "$RLOCK_VERSION"  "$HOME/rlock"
        fetch pirj/snapcompose "$SNAPCOMPOSE_VERSION" "$HOME/snapcompose"
        # aq's main script is at the repo root, not under bin/.
        chmod +x "$HOME/aq/aq"

    - name: Wire snapcompose / rlock / aq into the runner env
      shell: bash
      run: |
        set -e
        {
          echo "$HOME/aq"
          echo "$HOME/rlock/bin"
          echo "$HOME/snapcompose/bin"
        } >> "$GITHUB_PATH"
        echo "RLOCK_PLUGIN_PATH=$HOME/snapcompose/plugins" >> "$GITHUB_ENV"
        if [ "${{ inputs.no-snapshot-compress }}" = "true" ]; then
          echo "AQ_NO_SNAPSHOT_COMPRESS=1" >> "$GITHUB_ENV"
        fi

    - name: Compute cache key
      id: cache-key
      shell: bash
      env:
        PREFIX:      ${{ inputs.cache-key-prefix }}
        EXTRA_PATHS: ${{ inputs.cache-extra-paths }}
      run: |
        set -e
        # Built-in cache-key-derivation: hash snapcompose.toml + the
        # union of common lockfiles + key_files commonly declared in
        # [prebuild.*]. Tunable per project via cache-extra-paths.
        DEFAULT_GLOBS=(
          'snapcompose.toml'
          '**/Gemfile.lock'
          '**/package-lock.json'
          '**/pnpm-lock.yaml'
          '**/uv.lock'
          '**/poetry.lock'
          '**/Cargo.lock'
          'db/schema.rb'
          'db/migrate/**'
          'Dockerfile'
          'docker-compose.yml'
          'docker-compose.yaml'
        )
        # Append user-supplied extras (one glob per line).
        if [ -n "$EXTRA_PATHS" ]; then
          while IFS= read -r line; do
            [ -n "$line" ] && DEFAULT_GLOBS+=("$line")
          done <<< "$EXTRA_PATHS"
        fi
        # Hash all matching files. Falls back to an empty string when
        # no files match; the cache key still has the os / prefix so
        # different runners stay segregated.
        HASH=$(printf '%s\n' "${DEFAULT_GLOBS[@]}" \
          | xargs -I {} sh -c "ls -d {} 2>/dev/null || true" \
          | sort -u \
          | xargs -r shasum -a 256 \
          | shasum -a 256 \
          | awk '{print $1}')
        echo "key=${PREFIX}-${RUNNER_OS}-${HASH}"          >> "$GITHUB_OUTPUT"
        echo "restore-keys=${PREFIX}-${RUNNER_OS}-"        >> "$GITHUB_OUTPUT"

    - name: Restore + auto-save snapcompose layer cache
      # actions/cache@v4 (the unified action, not split restore/save)
      # has a built-in post-job step that saves the cache on job end.
      # That's what we want — the cache should reflect WHATEVER the
      # user's subsequent `bake run` steps populated, not the empty
      # state right after restore. Composite actions can't ship their
      # own post-step in YAML, so we lean on the upstream action's
      # post-hook.
      #
      # `cache-restore-only=true` switches to actions/cache/restore@v4
      # (no save) for jobs that explicitly don't want to populate the
      # cache (e.g. PR builds against ephemeral branches).
      uses: actions/cache@v4
      if: inputs.cache-restore-only != 'true'
      with:
        path: |
          ~/.local/share/aq/cache
          ~/.local/share/aq/x86_64
          ~/.local/share/aq/aarch64
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: ${{ steps.cache-key.outputs.restore-keys }}

    - name: Restore only (no save) — when cache-restore-only=true
      uses: actions/cache/restore@v4
      id: cache-restore-only
      if: inputs.cache-restore-only == 'true'
      with:
        path: |
          ~/.local/share/aq/cache
          ~/.local/share/aq/x86_64
          ~/.local/share/aq/aarch64
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: ${{ steps.cache-key.outputs.restore-keys }}

    - name: OCI fallback pull (on GH-cache miss + oci-cache-ref set)
      shell: bash
      if: |
        inputs.oci-cache-ref != ''
        && steps.cache-restore.outputs.cache-hit != 'true'
        && steps.cache-restore-only.outputs.cache-hit != 'true'
      env:
        OCI_REF: ${{ inputs.oci-cache-ref }}
      run: |
        set -e
        echo "GH cache miss — attempting OCI fallback pull from $OCI_REF"
        # GHCR uses GITHUB_TOKEN auth; users with non-GHCR registries
        # must `oras login` in an earlier step.
        if [[ "$OCI_REF" == ghcr.io/* ]] && [ -n "${GITHUB_TOKEN:-}" ]; then
          echo "$GITHUB_TOKEN" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        fi
        # bake-cache --pull restores into $RL_CACHE_DIR.
        # Falls back gracefully if the OCI ref doesn't exist yet
        # (e.g. first-ever push on a new repo).
        bake-cache --pull "$OCI_REF" || \
          echo "OCI fallback pull failed (probably no artifact at $OCI_REF yet); cold path will rebuild and the user's post-step push will populate it."
